<!DOCTYPE html>
<html lang="en" data-theme="dual">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade // Mathisha Angirasa</title>
    <meta name="theme-color" content="#00E5FF">
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    
    <style>
        body { overflow: hidden; } /* No scroll on arcade */
        .nav-wrapper { position: fixed; top: 0; width: 100%; z-index: var(--z-nav); padding: 0 var(--gutter); height: 64px; background: var(--surface-glass); backdrop-filter: blur(28px); border-bottom: 1px solid var(--cyan-border); }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; height: 100%; max-width: var(--max-w); margin: 0 auto; }
        .logo-compound { display: flex; align-items: baseline; font-weight: 700; cursor: pointer; }
        .logo-ma { font-family: var(--font-display); font-size: 20px; color: var(--cyan); }
        .logo-dev { font-family: var(--font-mono); font-size: 20px; color: var(--text-1); }
        .nav-links { display: none; gap: var(--s-24); }
        @media (min-width: 1024px) { .nav-links { display: flex; } }

        .game-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding-top: 64px; }

        .score-board { display: flex; justify-content: space-between; width: 100%; max-width: 600px; padding: 0 var(--s-16) var(--s-16); }
        .score-lbl { font-family: var(--font-mono); font-size: 14px; color: var(--text-1); }
        .score-val { font-family: var(--font-stat); font-size: 48px; color: var(--cyan); line-height: 1; transition: color 0.3s; }
        .score-val.alt { color: var(--red); }
        .score-val.gold { color: #FFD700; text-shadow: 0 0 16px rgba(255,215,0,0.5); }

        .canvas-wrapper { position: relative; width: 100%; max-width: 600px; aspect-ratio: 1/1; border: 2px solid var(--cyan-border); box-shadow: 0 0 32px rgba(0,229,255,0.1); background: var(--surface-00); background-image: repeating-linear-gradient(rgba(0, 229, 255, 0.04) 0, rgba(0, 229, 255, 0.04) 1px, transparent 1px, transparent 30px), repeating-linear-gradient(90deg, rgba(0, 229, 255, 0.04) 0, rgba(0, 229, 255, 0.04) 1px, transparent 1px, transparent 30px); background-size: 30px 30px; }

        #snake-canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #overlay-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

        .game-state-overlay { position: absolute; inset: 0; background: rgba(3,3,10,0.8); backdrop-filter: blur(4px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; transition: opacity 0.3s; }
        .game-state-overlay.hidden { opacity: 0; pointer-events: none; }

        .game-title { font-family: var(--font-display); font-size: 48px; color: var(--cyan); margin-bottom: var(--s-24); text-shadow: var(--glow-cyan); }

        /* Mobile D-Pad */
        .d-pad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 8px; margin-top: var(--s-32); }
        @media (min-width: 768px) { .d-pad { display: none; } }
        .d-btn { background: transparent; border: 2px solid var(--cyan-border); display: flex; align-items: center; justify-content: center; color: var(--cyan); border-radius: 8px; }
        .d-btn:active { background: var(--cyan-hot); color: var(--void); }
        .d-up { grid-column: 2; grid-row: 1; }
        .d-left { grid-column: 1; grid-row: 2; }
        .d-right { grid-column: 3; grid-row: 2; }
        .d-down { grid-column: 2; grid-row: 3; }
        .d-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }

        .glitch-wrapper { animation: none; }
        .glitch-wrapper.active { animation: glitchH 1.5s linear infinite; }
    </style>
</head>
<body>
    <header class="nav-wrapper">
        <div class="nav-inner">
            <a href="index.html" class="logo-compound interactable">
                <span class="logo-ma">MA*</span><span class="logo-dev">_DEV</span>
            </a>
            <div style="font-family: var(--font-mono); font-size: 14px; color: var(--cyan);">[ SYSTEM_ARCADE ]</div>
        </div>
    </header>

    <main class="game-container">
        <div class="score-board">
            <div>
                <div class="score-lbl">CURRENT_SCORE</div>
                <div class="score-val" id="score">000</div>
            </div>
            <div style="text-align: right;">
                <div class="score-lbl">HIGH_SCORE</div>
                <div class="score-val alt" id="high-score">000</div>
            </div>
        </div>

        <div class="canvas-wrapper glitch-wrapper" id="game-wrapper">
            <canvas id="snake-canvas" width="600" height="600"></canvas>
            <canvas id="overlay-canvas" width="600" height="600"></canvas>

            <div class="game-state-overlay" id="overlay">
                <div class="game-title" id="overlay-title">SNAKE_PROTOCOL</div>
                <button class="btn btn--dual" id="start-btn">INITIALIZE</button>
            </div>
        </div>

        <div class="d-pad">
            <button class="d-btn d-up" id="btn-up"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
            <button class="d-btn d-left" id="btn-left"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
            <button class="d-btn d-right" id="btn-right"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
            <button class="d-btn d-down" id="btn-down"><svg viewBox="0 0 24 24"><path d="M12 5v14M19 12l-7 7-7-7"/></svg></button>
        </div>
    </main>

    <script type="module">
        import { CustomCursor } from './assets/js/core/Cursor.js';
        import { AudioSystem } from './assets/js/core/Audio.js';
        import { PageTransitions } from './assets/js/core/PageTransitions.js';
        import { ToastManager } from './assets/js/core/Toast.js';

        new CustomCursor();
        new PageTransitions();
        window.toast = new ToastManager();
        let audio;
        document.addEventListener('click', () => { if(!audio) audio = new AudioSystem(); }, {once:true});

        // Game Logic
        const canvas = document.getElementById('snake-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const oCanvas = document.getElementById('overlay-canvas');
        const oCtx = oCanvas.getContext('2d');

        const scoreEl = document.getElementById('score');
        const hsEl = document.getElementById('high-score');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const startBtn = document.getElementById('start-btn');
        const wrapper = document.getElementById('game-wrapper');

        const gridSize = 20;
        const cellSize = 600 / gridSize;
        
        let snake = [];
        let dx = 0, dy = 0;
        let nextDx = 0, nextDy = 0;
        let food = {x: 15, y: 10};
        let score = 0;
        let highScore = localStorage.getItem('madev_snake_hs') || 0;
        let state = 'IDLE'; // IDLE, PLAYING, GAME_OVER
        let lastTime = 0;
        let baseSpeed = 150; // ms per frame
        let currentSpeed = baseSpeed;
        
        let heatMode = false;
        
        hsEl.textContent = String(highScore).padStart(3, '0');
        
        const reset = () => {
            snake = [ {x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10} ];
            dx = 1; dy = 0; nextDx = 1; nextDy = 0;
            score = 0;
            currentSpeed = baseSpeed;
            heatMode = false;
            updateScore();
            placeFood();
            wrapper.classList.remove('active'); // stop glitch
        };

        const placeFood = () => {
            let valid = false;
            while(!valid) {
                food.x = Math.floor(Math.random() * gridSize);
                food.y = Math.floor(Math.random() * gridSize);
                valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        };

        const updateScore = () => {
            scoreEl.textContent = String(score).padStart(3, '0');
            if(score >= 10 && Math.floor(score/10) % 2 !== 0) scoreEl.classList.add('alt');
            else scoreEl.classList.remove('alt');

            if(heatMode) scoreEl.classList.add('gold');
            else scoreEl.classList.remove('gold');
        };

        const draw = () => {
            // Background handled by CSS
            ctx.fillStyle = '#06060F';
            ctx.fillRect(0,0,600,600);

            // Draw Snake
            snake.forEach((segment, i) => {
                const alpha = 1.0 - (i / snake.length) * 0.6;
                if(heatMode) ctx.fillStyle = `rgba(255, 77, 109, ${alpha})`;
                else ctx.fillStyle = `rgba(0, 229, 255, ${alpha})`;

                // 2px gap
                ctx.fillRect(segment.x * cellSize + 1, segment.y * cellSize + 1, cellSize - 2, cellSize - 2);
            });

            // Draw Food
            const fColor = heatMode ? '#00E5FF' : '#FF4D6D';
            ctx.fillStyle = fColor;
            const cx = food.x * cellSize + cellSize/2;
            const cy = food.y * cellSize + cellSize/2;

            // Pulse food
            const pulse = (Math.sin(performance.now() / 200) * 0.5 + 0.5) * 4;
            ctx.beginPath();
            ctx.arc(cx, cy, (cellSize/2 - 4) + pulse, 0, Math.PI*2);
            ctx.fill();
        };

        const explodeParticles = (x, y, color) => {
            // Highscore burst logic
            oCtx.clearRect(0,0,600,600);
            const p = [];
            for(let i=0; i<30; i++) {
                p.push({
                    x, y,
                    vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                    life: 1.0
                });
            }
            const anim = () => {
                oCtx.clearRect(0,0,600,600);
                let alive = false;
                p.forEach(part => {
                    part.x += part.vx; part.y += part.vy; part.life -= 0.05;
                    if(part.life > 0) {
                        alive = true;
                        oCtx.fillStyle = `rgba(${color}, ${part.life})`;
                        oCtx.fillRect(part.x, part.y, 4, 4);
                    }
                });
                if(alive) requestAnimationFrame(anim);
                else oCtx.clearRect(0,0,600,600);
            };
            requestAnimationFrame(anim);
        };

        const loop = (timestamp) => {
            if(state !== 'PLAYING') return;
            requestAnimationFrame(loop);

            if(timestamp - lastTime < currentSpeed) return;
            lastTime = timestamp;

            dx = nextDx; dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall collision
            if(head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                gameOver(); return;
            }
            // Self collision
            if(snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver(); return;
            }

            snake.unshift(head);

            // Eat
            if(head.x === food.x && head.y === food.y) {
                score += heatMode ? 2 : 1;
                updateScore();
                placeFood();
                currentSpeed = Math.max(50, baseSpeed - Math.floor(score/5) * 5); // Faster
                if(audio) audio.playClick(1200, 0.01, 0.05); // blip
                canvas.style.animation = 'none';
                canvas.offsetHeight;
                canvas.style.animation = 'snakeEat 0.1s ease';
            } else {
                snake.pop();
            }

            draw();
        };

        const gameOver = () => {
            state = 'GAME_OVER';
            wrapper.classList.add('active'); // trigger CSS glitch
            overlayTitle.textContent = "PROCESS TERMINATED";
            startBtn.textContent = "SYSTEM_REBOOT";
            overlay.classList.remove('hidden');

            if(score > highScore) {
                highScore = score;
                localStorage.setItem('madev_snake_hs', highScore);
                hsEl.textContent = String(highScore).padStart(3, '0');
                explodeParticles(300, 300, '0, 229, 255'); // Cyan burst
                if(audio) audio.playClick(800, 0.5, 0.1);
            } else {
                if(audio) audio.playClick(200, 0.2, 0.1); // error sound
            }
        };

        startBtn.addEventListener('click', () => {
            overlay.classList.add('hidden');
            reset();
            state = 'PLAYING';
            lastTime = performance.now();
            requestAnimationFrame(loop);
        });

        // Controls
        const handleInput = (key) => {
            if(state !== 'PLAYING') {
                 // Easter Egg 06
                 if(state === 'IDLE' && key === 'h') heatStr += 'h';
                 if(state === 'IDLE' && key === 'e' && heatStr==='h') heatStr += 'e';
                 if(state === 'IDLE' && key === 'a' && heatStr==='he') heatStr += 'a';
                 if(state === 'IDLE' && key === 't' && heatStr==='hea') {
                      heatMode = true;
                      window.toast.show("HEAT MODE — 2X SCORE", "error");
                      heatStr = "";
                      baseSpeed = 75;
                      reset(); draw(); // visual update
                 }
                 return;
            }
            if(key === 'ArrowUp' && dy !== 1) { nextDx = 0; nextDy = -1; }
            if(key === 'ArrowDown' && dy !== -1) { nextDx = 0; nextDy = 1; }
            if(key === 'ArrowLeft' && dx !== 1) { nextDx = -1; nextDy = 0; }
            if(key === 'ArrowRight' && dx !== -1) { nextDx = 1; nextDy = 0; }
        };

        let heatStr = "";
        document.addEventListener('keydown', (e) => handleInput(e.key));

        document.getElementById('btn-up').addEventListener('touchstart', (e)=>{e.preventDefault(); handleInput('ArrowUp')});
        document.getElementById('btn-down').addEventListener('touchstart', (e)=>{e.preventDefault(); handleInput('ArrowDown')});
        document.getElementById('btn-left').addEventListener('touchstart', (e)=>{e.preventDefault(); handleInput('ArrowLeft')});
        document.getElementById('btn-right').addEventListener('touchstart', (e)=>{e.preventDefault(); handleInput('ArrowRight')});

        // Initial render
        reset();
        draw();

    </script>
</body>
</html>
