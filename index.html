    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            cursor: none;
            overflow-x: hidden;
        }

        /* Enhanced Custom Cursor */
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #00FFDE;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            mix-blend-mode: difference;
        }

        .cursor-dot {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #00FFDE;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.15s ease;
        }

        .cursor-hover {
            transform: scale(2.5);
            background: rgba(0, 255, 222, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 222, 0.8);
        }

        /* Enhanced Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Enhanced Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #00FFDE, #FF3366, #FF10F0, #0080FF);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShimmer 3s ease-in-out infinite;
        }

        /* Neon Button Enhancement */
        .neon-btn {
            background: linear-gradient(45deg, #00FFDE, #FF3366);
            border: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 222, 0.4);
        }

        .neon-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .neon-btn:hover::before {
            left: 100%;
        }

        .neon-btn:hover {
            box-shadow: 0 0 40px rgba(0, 255, 222, 0.8);
            transform: translateY(-2px) scale(1.05);
        }

        /* Typing Effect Enhancement */
        .typing-text::after {
            content: '|';
            animation: blink 1s infinite;
            color: #00FFDE;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Particle Canvas */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Mobile Menu Enhancement */
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mobile-menu.active {
            transform: translateX(0);
        }

        /* Scroll Progress Bar */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #00FFDE, #FF3366);
            z-index: 9999;
            transition: width 0.3s ease;
        }

        /* Enhanced Card Hover Effects */
        .enhanced-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .enhanced-card:hover {
            transform: translateY(-15px) rotateX(5deg) rotateY(-5deg) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 255, 222, 0.2);
        }

        /* Advanced Loading Animation */
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 222, 0.3);
            border-top: 3px solid #00FFDE;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Matrix Rain Effect */
        .matrix-char {
            position: absolute;
            color: #00FFDE;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            opacity: 0.7;
            animation: matrixRain 3s linear infinite;
        }

        @keyframes matrixRain {
            0% {
                transform: translateY(-100vh);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* Advanced Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00FFDE, #FF3366);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #FF3366, #00FFDE);
        }

        /* Easter Egg Animation */
        @keyframes logo-easter-egg {
            0% { transform: scale(1) rotate(0deg); text-shadow: 0 0 10px #00FFDE; }
            25% { transform: scale(1.2) rotate(-10deg); text-shadow: 0 0 20px #FF3366; }
            50% { transform: scale(1) rotate(10deg); text-shadow: 0 0 30px #FF10F0; }
            75% { transform: scale(1.2) rotate(0deg); text-shadow: 0 0 20px #0080FF; }
            100% { transform: scale(1) rotate(0deg); text-shadow: none; }
        }
        .logo-easter-egg-animation {
            animation: logo-easter-egg 1.5s ease-in-out;
        }

        /* Social Card Styling */
        .social-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .social-card:hover {

            box-shadow: 0 20px 40px rgba(0, 255, 222, 0.2);
        }
        .social-card .social-name {

            transform: translateY(10px);

        }
        .social-card:hover .social-name {
            opacity: 1;
            transform: translateY(0);
        }
        #profile-picture-container .is-hovered {
            transform: scale(1.05);
            transition: transform 0.3s ease-out;
        }
    </style>

    <script>
        // Matrix Rain Effect
        function createMatrixRain() {
            const chars = '01';
            const matrixContainer = document.body;
            
            setInterval(() => {
                if (Math.random() < 0.1) {
                    const char = document.createElement('div');
                    char.className = 'matrix-char';
                    char.textContent = chars[Math.floor(Math.random() * chars.length)];
                    char.style.left = Math.random() * 100 + '%';
                    char.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    
                    matrixContainer.appendChild(char);
                    
                    setTimeout(() => {
                        char.remove();
                    }, 5000);
                }
            }, 100);
        }

        // Initialize enhanced features
        document.addEventListener('DOMContentLoaded', function() {
            // We wait for our custom event before initializing certain features
            document.addEventListener('contentRendered', () => {
                console.log('Content rendered, initializing main.js features...');
                // main.js can now safely initialize its components
            });

            createMatrixRain();
            
            // Update current year is now handled in renderer.js
        });
    </script>
