<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — MATHIYA</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400,500,700&f[]=syne@600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--card-gap);
    }
    .gallery-item {
      height: 320px;
      background: var(--bg-elevated);
      border-radius: var(--r-lg);
      border: 1px solid var(--border-1);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">MATHIYA</a>
  </nav>
  <main id="main" class="container" style="padding-top: 160px;">
    <h1 class="hero-h1">VISUAL <span class="gradient-text">VAULT</span></h1>
    <div class="gallery-grid" style="margin-top: 64px;">
      <div class="gallery-item" style="background: url('assets/images/design-1.jpg') center/cover;"></div>
      <div class="gallery-item" style="background: url('assets/images/design-2.jpg') center/cover;"></div>
      <div class="gallery-item" style="background: url('assets/images/setup-1.jpg') center/cover;"></div>
      <div class="gallery-item" style="background: url('assets/images/setup-2.jpg') center/cover;"></div>
    </div>
  </main>
  <footer class="container" style="padding-block: 64px; border-top: 1px solid var(--border-0);">
    <p style="font-size: 14px; color: var(--text-3);">© 2025 MATHIYA — Mathisha Angirasa</p>
  </footer>
  <script type="module">
    import { Loader } from './assets/js/core/Loader.js';
    import { Byte } from './assets/js/core/Byte.js';
    new Loader();
    window.addEventListener('loader:complete', () => { new Byte(); });
  </script>
</body>
</html>
