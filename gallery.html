<!DOCTYPE html>
<html lang="en" data-theme="dual">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery // Mathisha Angirasa</title>
    <meta name="theme-color" content="#00E5FF">
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    
    <style>
        .nav-wrapper { position: fixed; top: 0; width: 100%; z-index: var(--z-nav); padding: 0 var(--gutter); height: 64px; background: var(--surface-glass); backdrop-filter: blur(28px); border-bottom: 1px solid var(--cyan-border); }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; height: 100%; max-width: var(--max-w); margin: 0 auto; }
        .logo-compound { display: flex; align-items: baseline; font-weight: 700; cursor: pointer; }
        .logo-ma { font-family: var(--font-display); font-size: 20px; color: var(--cyan); }
        .logo-dev { font-family: var(--font-mono); font-size: 20px; color: var(--text-1); }
        .nav-links { display: none; gap: var(--s-24); }
        @media (min-width: 1024px) { .nav-links { display: flex; } }

        .gallery-grid { display: grid; grid-template-columns: 1fr; gap: var(--gutter); padding-top: 100px; padding-bottom: var(--s-128); }
        @media (min-width: 768px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }

        .gallery-item { position: relative; overflow: hidden; cursor: pointer; border: 1px solid var(--cyan-border); aspect-ratio: 4/3; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--dur-slow); }
        .gallery-item:hover .gallery-img { transform: scale(1.05); }

        .gallery-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,229,255,0.4), rgba(255,77,109,0.2)); opacity: 0; transition: opacity var(--dur-mid); display: flex; align-items: flex-end; padding: var(--s-24); pointer-events: none; }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        .gallery-caption { font-family: var(--font-mono); font-size: 14px; color: var(--void); background: var(--cyan); padding: 4px 12px; transform: translateY(20px); transition: transform var(--dur-mid) var(--ease-expo); }
        .gallery-item:hover .gallery-caption { transform: translateY(0); }

        .filters { display: flex; gap: var(--s-16); overflow-x: auto; padding: 80px var(--gutter) var(--s-16); position: sticky; top: 0; background: var(--void); z-index: var(--z-sticky); border-bottom: 1px solid var(--grid-line); }
        .filters::-webkit-scrollbar { display: none; }

        /* Lightbox */
        .lightbox { position: fixed; inset: 0; background: rgba(3,3,10,0.95); z-index: 100000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--dur-mid); }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        .lb-img-container { position: relative; max-width: 90vw; max-height: 80vh; }
        .lb-img { max-width: 100%; max-height: 80vh; object-fit: contain; border: 1px solid var(--cyan); box-shadow: var(--glow-cyan); }

        .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--surface-glass); border: 1px solid var(--cyan); color: var(--cyan); cursor: pointer; transition: all 0.2s; }
        .lb-nav:hover { background: var(--cyan); color: var(--void); }
        .lb-prev { left: -64px; }
        .lb-next { right: -64px; }

        .lb-close { position: absolute; top: 24px; right: 24px; width: 48px; height: 48px; background: var(--surface-glass); border: 1px solid var(--red); color: var(--red); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 24px; font-family: var(--font-mono); }
        .lb-close:hover { background: var(--red); color: var(--void); box-shadow: var(--glow-red); }

        .lb-caption { position: absolute; bottom: -40px; left: 0; font-family: var(--font-mono); color: var(--cyan); font-size: 14px; }

        @media (max-width: 768px) {
            .lb-nav { display: none; } /* Use swipe on mobile */
        }
    </style>
</head>
<body>
    <div class="scroll-container">
        
        <header class="nav-wrapper">
            <div class="nav-inner">
                <a href="index.html" class="logo-compound interactable">
                    <span class="logo-ma">MA*</span><span class="logo-dev">_DEV</span>
                </a>
                <nav class="nav-links">
                    <a href="index.html" class="nav-link">INDEX</a>
                    <a href="projects.html" class="nav-link">PROJECTS</a>
                    <a href="skills.html" class="nav-link">SKILLS</a>
                    <a href="blog.html" class="nav-link">BLOG</a>
                    <a href="marketplace.html" class="nav-link">MARKETPLACE</a>
                    <a href="contact.html" class="nav-link">CONTACT</a>
                </nav>
            </div>
        </header>

        <div class="filters">
            <button class="tag active" data-filter="all">ALL</button>
            <button class="tag" data-filter="ui">UI DESIGN</button>
            <button class="tag" data-filter="3d">3D RENDER</button>
            <button class="tag" data-filter="code">CODE ART</button>
        </div>

        <main class="container gallery-grid stagger" id="gallery-grid">
            <!-- Populated via JS -->
        </main>
    </div>

    <div class="lightbox" id="lightbox" aria-modal="true" role="dialog">
        <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
        <div class="lb-img-container">
            <img src="" alt="Full resolution" class="lb-img" id="lb-img">
            <div class="lb-caption" id="lb-caption"></div>
            <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="lb-nav lb-next" id="lb-next" aria-label="Next">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { CustomCursor } from './assets/js/core/Cursor.js';
        import { SmoothScroll } from './assets/js/core/SmoothScroll.js';
        import { ScrollReveal } from './assets/js/core/ScrollReveal.js';
        import { PageTransitions } from './assets/js/core/PageTransitions.js';

        new CustomCursor();
        new SmoothScroll();
        new PageTransitions();

        const images = [
            { src: 'assets/img/og-card.webp', caption: 'DUAL_SIGNAL_INIT', cat: 'code' },
            { src: 'assets/img/hero-bg.webp', caption: 'TERMINAL_WORKSPACE', cat: '3d' },
            { src: 'assets/img/project-marketplace.webp', caption: 'MARKETPLACE_UI_v1', cat: 'ui' },
            { src: 'assets/img/project-game.webp', caption: 'ISO_RENDER_ENGINE', cat: '3d' },
            { src: 'assets/img/about-bg.webp', caption: 'NIGHT_OPERATIONS', cat: 'code' },
            { src: 'assets/img/marketplace-hero.webp', caption: 'VOID_MARKET', cat: 'ui' },
            { src: 'assets/img/blog-featured.webp', caption: 'SYNTAX_HIGHLIGHT', cat: 'code' },
            { src: 'assets/img/ar-hero.webp', caption: 'XR_PROJECTION', cat: '3d' },
            { src: 'assets/img/avatar-wireframe.webp', caption: 'IDENTITY_MESH', cat: '3d' }
        ];

        const grid = document.getElementById('gallery-grid');
        
        images.forEach((img, idx) => {
            const el = document.createElement('div');
            el.className = 'gallery-item interactable';
            el.setAttribute('data-reveal', '');
            el.setAttribute('data-cat', img.cat);
            el.setAttribute('data-idx', idx);

            el.innerHTML = `
                <img src="${img.src}" alt="${img.caption}" class="gallery-img" loading="lazy">
                <div class="gallery-overlay">
                    <div class="gallery-caption">${img.caption}</div>
                </div>
            `;
            grid.appendChild(el);

            el.addEventListener('click', () => openLightbox(idx));
        });

        new ScrollReveal();

        // Filters
        const tags = document.querySelectorAll('.filters .tag');
        const items = document.querySelectorAll('.gallery-item');

        tags.forEach(tag => {
            tag.addEventListener('click', () => {
                tags.forEach(t => t.classList.remove('active'));
                tag.classList.add('active');

                const filter = tag.getAttribute('data-filter');
                items.forEach(item => {
                    if(filter === 'all' || item.getAttribute('data-cat') === filter) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });

        // Lightbox Logic
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbCap = document.getElementById('lb-caption');
        let currentIdx = 0;

        const openLightbox = (idx) => {
            currentIdx = idx;
            updateLightbox();
            lb.classList.add('active');
        };

        const closeLightbox = () => {
            lb.classList.remove('active');
        };

        const updateLightbox = () => {
            const img = images[currentIdx];
            lbImg.src = img.src;
            lbCap.textContent = `[ ${currentIdx + 1} / ${images.length} ] ${img.caption}`;
        };

        document.getElementById('lb-close').addEventListener('click', closeLightbox);
        document.getElementById('lb-prev').addEventListener('click', () => {
            currentIdx = (currentIdx - 1 + images.length) % images.length;
            updateLightbox();
        });
        document.getElementById('lb-next').addEventListener('click', () => {
            currentIdx = (currentIdx + 1) % images.length;
            updateLightbox();
        });

        // Keyboard & Swipe
        document.addEventListener('keydown', (e) => {
            if(!lb.classList.contains('active')) return;
            if(e.key === 'Escape') closeLightbox();
            if(e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
            if(e.key === 'ArrowRight') document.getElementById('lb-next').click();
        });

        let touchstartX = 0;
        lb.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive: true});
        lb.addEventListener('touchend', e => {
            const touchendX = e.changedTouches[0].screenX;
            if(touchendX < touchstartX - 50) document.getElementById('lb-next').click();
            if(touchendX > touchstartX + 50) document.getElementById('lb-prev').click();
        }, {passive: true});

    </script>
</body>
</html>
