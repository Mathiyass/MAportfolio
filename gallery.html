<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22D3EE">
  <title>Gallery | MATHIYA</title>
  
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400,500,700&f[]=syne@600,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">

  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--s-6);
    }
    .gallery-item {
      position: relative;
      border-radius: var(--r-md);
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform var(--dur-slow) var(--ease-expo);
    }
    .gallery-item:hover img {
      transform: scale(1.05);
    }
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg-glass-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--dur-mid) var(--ease-expo);
    }
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">MATHIYA</a>
    <div class="nav-links hidden-mobile">
      <a href="index.html" class="nav-link">Home</a>
      <a href="projects.html" class="nav-link">Projects</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="gallery.html" class="nav-link active">Gallery</a>
    </div>
    <div class="flex items-center gap-4">
      <a href="contact.html" class="btn btn--primary nav-cta">Get in touch</a>
    </div>
  </nav>

  <main id="main" class="content-hidden">
    <canvas id="canvas-bg" style="position:fixed; inset:0; z-index:var(--z-canvas); opacity:0.15; pointer-events:none;"></canvas>

    <section class="section" style="padding-top: 160px;">
      <div class="container">
        <h1 style="font-family: var(--font-display); font-size: 80px; margin-bottom: 64px; text-align: center;">Visual <span class="gradient-text">Archive.</span></h1>
        
        <div class="gallery-grid">
          <div class="gallery-item" data-reveal style="--i:1">
            <img src="assets/img/project-ar.webp" alt="AR Interface">
            <div class="gallery-overlay"><span class="badge">Spatial UI</span></div>
          </div>
          <div class="gallery-item" data-reveal style="--i:2">
            <img src="assets/img/game-quebes.webp" alt="Killer Quebes">
            <div class="gallery-overlay"><span class="badge">Game Render</span></div>
          </div>
          <div class="gallery-item" data-reveal style="--i:3">
            <img src="assets/img/marketplace.webp" alt="Marketplace UI">
            <div class="gallery-overlay"><span class="badge">Product UI</span></div>
          </div>
          <div class="gallery-item" data-reveal style="--i:4">
            <img src="assets/img/project-android.webp" alt="Android App">
            <div class="gallery-overlay"><span class="badge">Mobile</span></div>
          </div>
          <div class="gallery-item" data-reveal style="--i:5">
            <img src="assets/img/lab-shader.webp" alt="Shader Art">
            <div class="gallery-overlay"><span class="badge">GLSL</span></div>
          </div>
          <div class="gallery-item" data-reveal style="--i:6">
            <img src="assets/img/byte-concept.webp" alt="BYTE Concept">
            <div class="gallery-overlay"><span class="badge">Mascot</span></div>
          </div>
        </div>

      </div>
    </section>

    <footer class="container" style="padding-block: 80px; border-top: 1px solid var(--border-0); margin-top: 64px;">
      <div class="flex justify-between items-center">
        <div>
          <div class="nav-logo">MATHIYA</div>
          <p style="font-family: var(--font-mono); font-size: 12px; color: var(--text-3); margin-top: 12px;">© 2025 MATHIYA — Mathisha Angirasa</p>
        </div>
      </div>
    </footer>
  </main>

  <script type="module">
    import { Loader } from './assets/js/core/Loader.js';
    import { Cursor } from './assets/js/core/Cursor.js';
    import { SmoothScroll } from './assets/js/core/SmoothScroll.js';
    import { ScrollReveal } from './assets/js/core/ScrollReveal.js';
    import { LazyLoad } from './assets/js/core/LazyLoad.js';
    import { Byte } from './assets/js/mascot/Byte.js';
    import { WebGLEngine } from './assets/js/engine/WebGLEngine.js';
    import { PageTransitions } from './assets/js/core/PageTransitions.js';

    new Loader();
    new Cursor();
    new SmoothScroll();
    new ScrollReveal();
    new LazyLoad();
    new PageTransitions();

    window.addEventListener('loader:complete', () => {
      new WebGLEngine(document.getElementById('canvas-bg'), 'SHADER_05', { pointerTracking: true });
      new Byte();
    });
  </script>
</body>
</html>
