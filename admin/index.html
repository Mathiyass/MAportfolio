<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CMS Dashboard | Mthisha Angirasa</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="../assets/css/global.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="../assets/js/tailwind-config.js"></script>

    <!-- SimpleMDE for markdown editing -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">
</head>

<body class="bg-background-dark font-sans text-slate-100 flex h-screen overflow-hidden selection:bg-primary/30">

    <!-- Sidebar -->
    <aside class="w-64 glass-effect border-r border-white/10 flex flex-col h-full z-20 shrink-0">
        <div class="p-6 border-b border-white/10 flex items-center justify-between">
            <span class="font-display font-bold text-xl tracking-tight text-white flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">dashboard</span> CMS
            </span>
            <span class="w-2 h-2 rounded-full bg-green-400 glow-box-primary"></span>
        </div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="admin-nav">
            <a href="#dashboard"
                class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-colors">
                <span class="material-symbols-outlined">monitoring</span> Dashboard
            </a>
            <a href="#projects"
                class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-colors">
                <span class="material-symbols-outlined">folder_special</span> Projects
            </a>
            <a href="#blog"
                class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-colors">
                <span class="material-symbols-outlined">article</span> Blog
            </a>
            <a href="#messages"
                class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-colors">
                <span class="material-symbols-outlined">inbox</span> Messages <span
                    class="ml-auto bg-primary/20 text-primary px-2 py-0.5 rounded-full text-xs font-bold">3</span>
            </a>
            <a href="#settings"
                class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-colors">
                <span class="material-symbols-outlined">settings</span> Settings
            </a>
        </nav>
        <div class="p-4 border-t border-white/10">
            <a href="../index.html"
                class="flex items-center justify-center gap-2 w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl text-slate-300 transition-colors border border-white/10">
                <span class="material-symbols-outlined text-[18px]">logout</span> Live Site
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 h-full overflow-y-auto relative bg-[#010105]">
        <!-- Top bar -->
        <header
            class="sticky top-0 z-10 glass-effect border-b border-white/10 p-4 px-8 flex justify-between items-center">
            <h2 id="view-title" class="text-2xl font-display font-bold text-white capitalize">Dashboard</h2>
            <div class="flex items-center gap-4">
                <span
                    class="material-symbols-outlined text-slate-400 hover:text-white cursor-pointer transition-colors">notifications</span>
                <img src="https://avatars.githubusercontent.com/u/120613292?v=4"
                    class="w-10 h-10 rounded-full border border-primary/50" />
            </div>
        </header>

        <!-- View Container -->
        <div id="view-container" class="p-8 max-w-7xl mx-auto pb-32">
            <!-- Rendered by app.js -->
        </div>
    </main>

    <!-- Modal Container -->
    <div id="modal-container"
        class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <!-- Rendered by app.js -->
    </div>

    <script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
