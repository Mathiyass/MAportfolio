<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Blog | Mathiya Angirasa</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.0.45/dist/lenis.css">

    <link href="./assets/css/global.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./assets/js/tailwind-config.js"></script>
</head>

<body class="bg-background-dark font-sans text-slate-100 selection:bg-primary/30">
    <div id="particles-canvas" class="fixed inset-0 pointer-events-none z-0 opacity-50"></div>

    <!-- Navbar -->
    <header class="fixed top-0 left-0 right-0 z-50 flex justify-center p-6 transition-all duration-300">
        <nav class="glass-effect flex items-center justify-between w-full max-w-7xl px-8 py-4 rounded-2xl">
            <a href="index.html" class="flex items-center gap-3">
                <div
                    class="w-10 h-10 bg-gradient-to-br from-primary to-accent-violet rounded-lg flex items-center justify-center font-display font-bold text-background-dark">
                    MA
                </div>
                <span class="font-display font-bold text-xl tracking-tight hidden sm:block glow-text">MATHIYA</span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <div class="flex items-center gap-10">
                    <a class="text-sm font-medium hover:text-primary transition-colors"
                        href="index.html#about">About</a>
                    <a class="text-sm font-medium hover:text-primary transition-colors"
                        href="projects.html">Projects</a>
                    <a class="text-sm font-medium text-primary transition-colors" href="blog.html">Blog</a>
                </div>
                <a href="index.html#contact"
                    class="bg-primary/10 border border-primary text-primary hover:bg-primary hover:text-background-dark px-6 py-2 rounded-xl text-sm font-bold transition-all shadow-lg shadow-primary/20">Let's
                    Talk</a>
            </div>
            <button id="mobile-menu-btn" class="md:hidden text-white hover:text-primary">
                <span class="material-symbols-outlined text-3xl">menu</span>
            </button>
        </nav>
    </header>

    <main class="relative z-10 pt-40 pb-24 px-6 max-w-5xl mx-auto min-h-screen">
        <div class="text-center mb-16 animate-fade-up">
            <h1 class="text-5xl md:text-7xl font-display font-bold mb-6 glow-text">Insights & Writings</h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">Thoughts on software engineering, design patterns, and
                building the future of the web.</p>
        </div>

        <div id="blog-list" class="space-y-8">
            <!-- Populated by JS -->
        </div>
    </main>

    <footer class="py-12 border-t border-white/10 glass-effect relative z-10 w-full mt-auto">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-slate-500 text-sm">&copy; 2025 Mathiya Angirasa. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.45/bundled/lenis.min.js"></script>
    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = window.portfolioData;
            if (!data) return;
            const posts = data.getBlogPosts();
            const container = document.getElementById('blog-list');

            let html = '';
            posts.forEach((post, index) => {
                html += `
                    <a href="blog-post.html?id=${post.id}" class="block group animate-fade-up" style="animation-delay: ${0.1 * index}s">
                        <div class="glass-effect p-8 rounded-2xl border border-white/10 hover:border-primary/50 transition-all duration-300 flex flex-col md:flex-row gap-8 items-center">
                            <div class="w-full md:w-1/3 h-48 overflow-hidden rounded-xl">
                                <img src="${post.image}" alt="${post.title}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" />
                            </div>
                            <div class="w-full md:w-2/3">
                                <div class="flex items-center gap-4 mb-4 text-sm font-medium">
                                    <span class="text-primary bg-primary/10 px-3 py-1 rounded-full uppercase tracking-wider text-xs">${post.category}</span>
                                    <span class="text-slate-500 flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">calendar_today</span> ${post.date}</span>
                                    <span class="text-slate-500 flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">schedule</span> ${post.readTime}</span>
                                </div>
                                <h2 class="text-3xl font-display font-bold text-white mb-4 group-hover:text-primary transition-colors">${post.title}</h2>
                                <p class="text-slate-400 text-lg line-clamp-2">${post.excerpt}</p>
                            </div>
                        </div>
                    </a>
                `;
            });
            if (container) container.innerHTML = html;
        });
    </script>
</body>

</html>
