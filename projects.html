<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>All Projects | Mathiya Angirasa</title>

    <!-- Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.0.45/dist/lenis.css">

    <!-- Custom CSS -->
    <link href="./assets/css/global.css" rel="stylesheet" />

    <!-- Tailwind JS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./assets/js/tailwind-config.js"></script>
</head>

<body class="bg-background-dark font-sans text-slate-100 selection:bg-primary/30">
    <div id="particles-canvas" class="fixed inset-0 pointer-events-none z-0"></div>

    <!-- Navbar -->
    <header class="fixed top-0 left-0 right-0 z-50 flex justify-center p-6 transition-all duration-300">
        <nav class="glass-effect flex items-center justify-between w-full max-w-7xl px-8 py-4 rounded-2xl">
            <a href="index.html" class="flex items-center gap-3">
                <div
                    class="w-10 h-10 bg-gradient-to-br from-primary to-accent-violet rounded-lg flex items-center justify-center font-display font-bold text-background-dark">
                    MA
                </div>
                <span class="font-display font-bold text-xl tracking-tight hidden sm:block">MATHIYA</span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <div class="flex items-center gap-10">
                    <a class="text-sm font-medium hover:text-primary transition-colors"
                        href="index.html#about">About</a>
                    <a class="text-sm font-medium text-primary transition-colors" href="projects.html">Projects</a>
                    <a class="text-sm font-medium hover:text-primary transition-colors" href="blog.html">Blog</a>
                </div>
                <a href="index.html#contact"
                    class="bg-primary/10 border border-primary text-primary hover:bg-primary hover:text-background-dark px-6 py-2 rounded-xl text-sm font-bold transition-all shadow-lg shadow-primary/20">Let's
                    Talk</a>
            </div>
            <button id="mobile-menu-btn" class="md:hidden text-white hover:text-primary">
                <span class="material-symbols-outlined text-3xl">menu</span>
            </button>
        </nav>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu"
        class="fixed inset-0 z-40 hidden flex-col items-center justify-center bg-background-dark/95 backdrop-blur-xl">
        <a href="index.html#about" class="text-2xl font-display font-bold mb-6 hover:text-primary mobile-link">About</a>
        <a href="projects.html" class="text-2xl font-display font-bold mb-6 text-primary mobile-link">Projects</a>
        <a href="blog.html" class="text-2xl font-display font-bold mb-6 hover:text-primary mobile-link">Blog</a>
        <a href="index.html#contact"
            class="text-2xl font-display font-bold mb-6 hover:text-primary mobile-link">Contact</a>
    </div>

    <main class="relative z-10 pt-40 pb-24 px-6 max-w-7xl mx-auto min-h-screen">
        <div class="text-center mb-16 animate-fade-up">
            <h1 class="text-5xl md:text-7xl font-display font-bold mb-6 glow-text">All Projects</h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">A comprehensive collection of my engineering, design,
                and experimental work.</p>
        </div>

        <!-- Filter Controls -->
        <div class="flex flex-wrap justify-center gap-4 mb-16 animate-fade-up" style="animation-delay: 0.2s"
            id="projects-filters">
            <!-- Populated by JS -->
        </div>

        <div id="full-projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Populated by JS -->
        </div>
    </main>

    <footer class="py-12 border-t border-white/10 glass-effect relative z-10 w-full mt-auto">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-slate-500 text-sm">&copy; 2025 Mathiya Angirasa. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.45/bundled/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = window.portfolioData;
            if (!data) return;
            const projects = data.getProjects();
            const grid = document.getElementById('full-projects-grid');

            let html = '';
            projects.forEach((project, index) => {
                html += `
                    <div class="group rounded-2xl glass-effect border border-white/10 overflow-hidden hover:border-primary/50 transition-all duration-300 animate-fade-up tilt-card" style="animation-delay: ${0.05 * index}s">
                        <div class="relative h-64 overflow-hidden">
                            <div class="absolute inset-0 bg-background-dark/50 group-hover:bg-transparent transition-colors z-10"></div>
                            <img src="${project.image}" alt="${project.title}" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" />
                            <div class="absolute top-4 right-4 z-20 flex gap-2">
                                <a href="${project.github}" class="w-10 h-10 rounded-full bg-black/50 backdrop-blur-md flex items-center justify-center text-white hover:text-primary transition-colors border border-white/10">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"></path></svg>
                                </a>
                                <a href="${project.link}" class="w-10 h-10 rounded-full bg-black/50 backdrop-blur-md flex items-center justify-center text-white hover:text-primary transition-colors border border-white/10">
                                    <span class="material-symbols-outlined text-[20px]">open_in_new</span>
                                </a>
                            </div>
                        </div>
                        <div class="p-8">
                            <h3 class="text-2xl font-display font-bold text-white mb-3 group-hover:text-primary transition-colors">${project.title}</h3>
                            <p class="text-slate-400 mb-6 line-clamp-2">${project.description}</p>
                            <div class="flex flex-wrap gap-2">
                                ${project.tech.map(t => `<span class="text-xs font-bold uppercase tracking-wider text-primary bg-primary/10 px-3 py-1 rounded-full border border-primary/20">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
            if (grid) grid.innerHTML = html;
        });
    </script>
</body>

</html>
