<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | MATHIYA</title>
    <meta name="description" content="Explore Mathiya's portfolio of innovative projects including web applications, games, and creative coding experiments.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2300FFDE'>M</text></svg>">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'orbitron': ['Orbitron', 'monospace'],
                        'inter': ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'cyber-cyan': '#00FFDE',
                        'cyber-red': '#FF3366',
                        'neon-pink': '#FF10F0',
                        'electric-blue': '#0080FF',
                        'dark-bg': '#0a0a0a',
                        'dark-card': '#1a1a2e',
                        'dark-accent': '#16213e',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow-pulse': 'glowPulse 2s ease-in-out infinite alternate',
                        'project-hover': 'projectHover 0.3s ease-out',
                    },
                    keyframes: {
                        'float': {
                            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        },
                        'glowPulse': {
                            '0%': { boxShadow: '0 0 20px rgba(0, 255, 222, 0.5)' },
                            '100%': { boxShadow: '0 0 40px rgba(0, 255, 222, 1), 0 0 60px rgba(255, 51, 102, 0.5)' },
                        },
                        'projectHover': {
                            '0%': { transform: 'translateY(0) scale(1)' },
                            '100%': { transform: 'translateY(-10px) scale(1.02)' },
                        },
                    },
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            cursor: none;
        }
        
        /* Custom Cursor */
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #00FFDE;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            mix-blend-mode: difference;
        }
        
        .cursor-dot {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #00FFDE;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.15s ease;
        }
        
        .cursor-hover {
            transform: scale(2);
            background: rgba(0, 255, 222, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 222, 0.8);
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #00FFDE, #FF3366, #FF10F0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Project Card Effects */
        .project-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .project-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 255, 222, 0.1);
        }
        
        /* Filter Buttons */
        .filter-btn {
            transition: all 0.3s ease;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #00FFDE, #FF3366);
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 255, 222, 0.4);
        }
        
        /* Modal */
        .modal {
            backdrop-filter: blur(10px);
        }
        
        .modal-content {
            animation: modalSlideIn 0.3s ease-out;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        /* Mobile Menu */
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        
        .mobile-menu.active {
            transform: translateX(0);
        }
        
        /* Scroll Progress */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #00FFDE, #FF3366);
            z-index: 9999;
            transition: width 0.3s ease;
        }
        
        /* Tag Effects */
        .tag {
            transition: all 0.3s ease;
        }
        
        .tag:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body class="dark text-white" data-page="projects">
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="cursor-dot" id="cursor-dot"></div>
    
    <!-- Scroll Progress -->
    <div class="scroll-progress" id="scroll-progress"></div>
    
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass transition-all duration-300" id="navbar">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="text-2xl font-bold font-orbitron gradient-text">
                    <a href="index.html" class="hover:scale-110 transition-transform duration-300"></a>
                </div>
                <div class="hidden md:flex space-x-8"></div>
                <button id="theme-toggle" class="hidden md:block p-2 rounded-lg glass hover:scale-110 transition-transform">
                    <i class="fas fa-moon text-cyber-cyan"></i>
                </button>
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg glass">
                    <i class="fas fa-bars text-cyber-cyan"></i>
                </button>
            </div>
        </div>
        <div class="mobile-menu fixed top-0 right-0 h-full w-80 glass md:hidden" id="mobile-menu">
            <div class="p-6">
                <button id="close-menu" class="float-right text-2xl text-cyber-cyan hover:rotate-90 transition-transform">
                    <i class="fas fa-times"></i>
                </button>
                <div class="clear-both mt-8 space-y-6"></div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="projects-hero" class="pt-32 pb-20 relative overflow-hidden">
        <div class="absolute inset-0">
            <div class="absolute top-20 left-10 w-64 h-64 bg-cyber-cyan opacity-10 rounded-full blur-3xl animate-float"></div>
            <div class="absolute bottom-20 right-10 w-96 h-96 bg-cyber-red opacity-10 rounded-full blur-3xl animate-float" style="animation-delay: -3s;"></div>
            <div class="absolute top-1/2 left-1/2 w-48 h-48 bg-neon-pink opacity-5 rounded-full blur-3xl animate-float" style="animation-delay: -1.5s;"></div>
        </div>
        <div class="container mx-auto px-6 text-center">
            <h1 class="text-4xl md:text-6xl font-bold font-orbitron mb-6 gradient-text" data-aos="fade-up"></h1>
            <p class="text-xl text-gray-300 max-w-3xl mx-auto" data-aos="fade-up" data-aos-delay="200"></p>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="py-10">
        <div class="container mx-auto px-6">
            <div id="filter-buttons" class="flex flex-wrap justify-center gap-4 mb-12" data-aos="fade-up"></div>
        </div>
    </section>

    <!-- Projects Grid -->
    <section class="py-20">
        <div class="container mx-auto px-6">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="projects-grid">
                <!-- Project cards will be rendered here by renderer.js -->
            </div>
        </div>
    </section>

    <!-- Project Modal -->
    <div id="project-modal" class="fixed inset-0 bg-black bg-opacity-80 modal hidden z-50 flex items-center justify-center p-4">
        <div class="modal-content glass rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-8">
                <div class="flex justify-between items-start mb-6">
                    <h2 class="text-3xl font-bold gradient-text font-orbitron" id="modal-title"></h2>
                    <button id="close-modal" class="text-2xl text-gray-400 hover:text-cyber-cyan transition-colors">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="grid md:grid-cols-2 gap-8">
                    <div>
                        <div class="w-full h-64 bg-gradient-to-br from-cyber-cyan to-cyber-red rounded-lg mb-6 flex items-center justify-center" id="modal-image">
                            <i></i>
                        </div>
                        <div class="flex gap-4 mb-6">
                            <a href="#" target="_blank" class="flex-1 bg-cyber-cyan text-black py-3 px-6 rounded-lg text-center font-semibold hover:bg-opacity-80 transition-all" id="modal-demo">
                                <i class="fas fa-external-link-alt mr-2"></i>Live Demo
                            </a>
                            <a href="#" target="_blank" class="flex-1 border-2 border-cyber-cyan text-cyber-cyan py-3 px-6 rounded-lg text-center font-semibold hover:bg-cyber-cyan hover:text-black transition-all" id="modal-github">
                                <i class="fab fa-github mr-2"></i>View Code
                            </a>
                        </div>
                    </div>
                    <div>
                        <p class="text-gray-300 mb-6 leading-relaxed" id="modal-description"></p>
                        <div class="mb-6">
                            <h3 class="text-xl font-bold mb-3 text-cyber-cyan font-orbitron">Technologies Used</h3>
                            <div class="flex flex-wrap gap-2" id="modal-tags"></div>
                        </div>
                        <div class="mb-6">
                            <h3 class="text-xl font-bold mb-3 text-cyber-cyan font-orbitron">Key Features</h3>
                            <ul class="list-disc list-inside text-gray-300 space-y-2" id="modal-features"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-12 border-t border-gray-800">
        <div class="container mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-6 md:mb-0">
                    <div class="text-2xl font-bold font-orbitron gradient-text mb-2"></div>
                    <p id="footer-text" class="text-gray-400"></p>
                </div>
                <div id="footer-social-links" class="flex space-x-6"></div>
            </div>
        </div>
    </footer>

    <script src="assets/js/renderer.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/projects.js"></script>
</body>
</html>
