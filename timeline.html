<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22D3EE">
  <title>Timeline | MATHIYA</title>
  
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400,500,700&f[]=syne@600,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">MATHIYA</a>
    <div class="nav-links hidden-mobile">
      <a href="index.html" class="nav-link">Home</a>
      <a href="projects.html" class="nav-link">Projects</a>
      <a href="about.html" class="nav-link">About</a>
    </div>
    <div class="flex items-center gap-4">
      <a href="contact.html" class="btn btn--primary nav-cta">Get in touch</a>
    </div>
  </nav>

  <main id="main" class="content-hidden">
    <canvas id="canvas-bg" style="position:fixed; inset:0; z-index:var(--z-canvas); opacity:0.15; pointer-events:none;"></canvas>

    <section class="section" style="padding-top: 160px; max-width: 800px; margin: 0 auto;">
      <h1 style="font-family: var(--font-display); font-size: 80px; margin-bottom: 24px; text-align: center;">The <span class="gradient-text">Timeline.</span></h1>
      
      <div id="timeline-container" style="margin-top: 80px;">
        <!-- Populated via JS -->
      </div>
    </section>

    <footer class="container" style="padding-block: 80px; border-top: 1px solid var(--border-0); margin-top: 64px;">
      <div class="flex justify-between items-center">
        <div>
          <div class="nav-logo">MATHIYA</div>
          <p style="font-family: var(--font-mono); font-size: 12px; color: var(--text-3); margin-top: 12px;">© 2025 MATHIYA — Mathisha Angirasa</p>
        </div>
      </div>
    </footer>
  </main>

  <script type="module">
    import { Loader } from './assets/js/core/Loader.js';
    import { Cursor } from './assets/js/core/Cursor.js';
    import { SmoothScroll } from './assets/js/core/SmoothScroll.js';
    import { ScrollReveal } from './assets/js/core/ScrollReveal.js';
    import { Byte } from './assets/js/mascot/Byte.js';
    import { WebGLEngine } from './assets/js/engine/WebGLEngine.js';
    import { PageTransitions } from './assets/js/core/PageTransitions.js';

    new Loader();
    new Cursor();
    new SmoothScroll();
    new ScrollReveal();
    new PageTransitions();

    window.addEventListener('loader:complete', () => {
      new WebGLEngine(document.getElementById('canvas-bg'), 'SHADER_02', { pointerTracking: true });
      new Byte();

      fetch('assets/data/timeline.json')
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('timeline-container');
          data.timeline.reverse().forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'card';
            el.style.cssText = \`
              margin-bottom: 32px; display: flex; gap: 32px;
              opacity: 0; transform: translateY(20px);
              transition: all var(--dur-mid) var(--ease-expo);
            \`;
            
            const color = i % 2 === 0 ? 'var(--cyan)' : 'var(--red)';
            
            el.innerHTML = \`
              <div style="font-family: var(--font-stat); font-size: 64px; color: \${color}; min-width: 120px;">\${item.year}</div>
              <div>
                <h3 style="font-family: var(--font-head); font-size: 24px; color: var(--text-0); margin-bottom: 12px;">\${item.title}</h3>
                <p style="font-size: 16px; color: var(--text-2); line-height: 1.6;">\${item.desc}</p>
                <span class="badge" style="margin-top: 16px;">\${item.type.toUpperCase()}</span>
              </div>
            \`;
            container.appendChild(el);
            
            // Trigger animation slightly staggered
            setTimeout(() => {
              el.style.opacity = '1';
              el.style.transform = 'translateY(0)';
            }, i * 150);
          });
        });
    });
  </script>
</body>
</html>
