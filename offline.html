<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22D3EE">
  <title>Offline | MATHIYA</title>
  
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400,500,700&f[]=syne@600,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body style="display: flex; height: 100vh; align-items: center; justify-content: center; text-align: center;">

  <div class="container">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" style="margin: 0 auto 32px; animation: terminalBlink 2s infinite;">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
    </svg>
    
    <h1 style="font-family: var(--font-display); font-size: 64px; margin-bottom: 16px;">You're <span class="gradient-text">offline.</span></h1>
    <p style="font-size: 18px; color: var(--text-2); max-width: 400px; margin: 0 auto 32px;">
      Signal lost. Reconnect to the grid to continue exploring. The system will auto-refresh when connection is restored.
    </p>

    <button onclick="window.location.reload()" class="btn btn--primary">Try Again</button>
  </div>

  <script>
    window.addEventListener('online', () => {
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
