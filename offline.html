<!DOCTYPE html>
<html lang="en" data-theme="dual">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00E5FF">
  <title>Offline // Mathisha Angirasa</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <style>
    body { font-family: var(--font-mono); background: var(--void); color: var(--cyan); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; text-align: center; }
    .ascii { font-size: 14px; line-height: 1.2; letter-spacing: 2px; white-space: pre; margin-bottom: 48px; color: var(--red); }
    h1 { font-family: var(--font-display); font-size: 48px; color: var(--text-0); margin-bottom: 16px; }
    .blink { animation: b 1s infinite step-end; color: var(--red); }
    @keyframes b { 50% { opacity: 0; } }
    .msg { font-size: 12px; color: var(--text-2); letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <pre class="ascii">
  ╔═════════════════════╗
  ║ SIGNAL LOST         ║
  ║ ▒▒▒▒▒▒▒░░░░░░       ║
  ╚═════════════════════╝
       │      │
      ─┼─    ─┼─
       │      │
  </pre>
  <h1>CONNECTION LOST<span class="blink">_</span></h1>
  <p class="msg">SERVING CACHED VERSION // MATHIYA PORTAL</p>

  <script>
    window.addEventListener('online', () => { window.location.reload(); });
  </script>
</body>
</html>
