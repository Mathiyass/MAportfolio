<!DOCTYPE html>
<html lang="en" data-theme="dual">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // SYSTEM_FAILURE</title>
    <meta name="theme-color" content="#FF4D6D">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">

    <style>
        body { overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        #canvas-bh { position: fixed; inset: 0; z-index: -1; }

        .error-content { position: relative; z-index: 10; padding: var(--s-32); background: rgba(9,9,22,0.4); backdrop-filter: blur(8px); border: 1px solid var(--red-border); }
        .error-content::before { content:''; position:absolute; inset:0; box-shadow: inset 0 0 60px rgba(255,77,109,0.1); pointer-events:none; }

        .glitch-404 { font-family: var(--font-display); font-size: clamp(80px, 15vw, 220px); font-weight: 900; line-height: 1; color: var(--text-0); margin-bottom: 16px; animation: glitch-flash 4s infinite; }
        @keyframes glitch-flash {
            0%, 90% { color: var(--text-0); transform: none; }
            91% { color: var(--cyan); transform: translateX(-4px); }
            92% { color: var(--red); transform: translateX(4px); }
            93% { color: var(--text-0); transform: none; }
        }

        .err-lbl { font-family: var(--font-mono); font-size: 16px; color: var(--red); letter-spacing: 0.2em; margin-bottom: var(--s-32); }

        .countdown { font-family: var(--font-stat); font-size: 80px; color: var(--red); line-height: 1; margin: var(--s-32) 0; }

        .actions { display: flex; gap: var(--s-16); justify-content: center; }
    </style>
</head>
<body>
    <canvas id="canvas-bh"></canvas>

    <div class="error-content" id="err-box">
        <div class="glitch-404" id="err-text">404</div>
        <div class="err-lbl">SYSTEM_FAILURE: VOID_DETECTED</div>

        <div style="font-family: var(--font-mono); font-size: 12px; color: var(--text-1);">REDIRECTING_IN:</div>
        <div class="countdown" id="cd-timer">10</div>

        <div class="actions">
            <a href="index.html" class="btn btn--red interactable">ABORT_REDIRECT</a>
        </div>
    </div>

    <script type="module">
        import { WebGLEngine } from './assets/js/engine/WebGLEngine.js';
        import { SHADER_09_BLACK_HOLE } from './assets/js/engine/shaders.js';
        import { CustomCursor } from './assets/js/core/Cursor.js';
        import { PageTransitions } from './assets/js/core/PageTransitions.js';

        new CustomCursor();
        const pt = new PageTransitions();

        if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            const engine = new WebGLEngine(document.getElementById('canvas-bh'));
            engine.compileProgram('bh', SHADER_09_BLACK_HOLE.vert, SHADER_09_BLACK_HOLE.frag);
            engine.render('bh');

            // Trigger 1.5s glitch on load
            const errBox = document.getElementById('err-box');
            errBox.style.animation = 'glitchH 1.5s linear forwards';
        }

        // Countdown
        let timeLeft = 10;
        const timerEl = document.getElementById('cd-timer');

        const tick = setInterval(() => {
            timeLeft--;
            timerEl.textContent = String(timeLeft).padStart(2, '0');

            // CSS beat animation
            timerEl.style.animation = 'none';
            timerEl.offsetHeight;
            timerEl.style.animation = 'neonPulseRed 0.5s alternate';

            if(timeLeft <= 0) {
                clearInterval(tick);
                pt._exit('index.html');
            }
        }, 1000);
    </script>
</body>
</html>
