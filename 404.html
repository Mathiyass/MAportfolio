<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22D3EE">
  <title>404 | MATHIYA</title>
  
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400,500,700&f[]=syne@600,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body style="overflow: hidden;">
  <nav class="nav">
    <a href="index.html" class="nav-logo">MATHIYA</a>
    <div class="flex items-center gap-4">
      <a href="contact.html" class="btn btn--primary nav-cta">Get in touch</a>
    </div>
  </nav>

  <main id="main" class="content-hidden" style="height: 100vh; display: flex; align-items: center; justify-content: center; position: relative;">
    <canvas id="canvas-bg" style="position:absolute; inset:0; z-index:var(--z-canvas); pointer-events:none;"></canvas>

    <div style="text-align: center; z-index: 10;">
      <h1 style="font-family: var(--font-display); font-size: clamp(120px, 15vw, 240px); line-height: 1; margin: 0;" class="gradient-text">404</h1>
      <h2 style="font-family: var(--font-head); font-size: 32px; margin-top: 16px; color: var(--text-0);">Entity not found in current timeline.</h2>
      <p style="font-family: var(--font-mono); font-size: 14px; color: var(--text-3); margin-top: 16px;">Redirecting to safe zone in <span id="countdown">10</span>s...</p>
      
      <div class="flex justify-center gap-4" style="margin-top: 48px;">
        <a href="index.html" class="btn btn--primary">Return Home</a>
        <a href="games.html" class="btn btn--secondary">Play a Game</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { Loader } from './assets/js/core/Loader.js';
    import { Cursor } from './assets/js/core/Cursor.js';
    import { Byte } from './assets/js/mascot/Byte.js';
    import { WebGLEngine } from './assets/js/engine/WebGLEngine.js';
    import { PageTransitions } from './assets/js/core/PageTransitions.js';

    new Loader();
    new Cursor();
    new PageTransitions();

    window.addEventListener('loader:complete', () => {
      new WebGLEngine(document.getElementById('canvas-bg'), 'SHADER_09', { opacity: 0.6, pointerTracking: true });
      const byte = new Byte();
      byte.setExpression('SAD');

      let count = 10;
      const el = document.getElementById('countdown');
      setInterval(() => {
        count--;
        if (count >= 0) el.textContent = count;
        if (count === 0) window.location.href = 'index.html';
      }, 1000);
    });
  </script>
</body>
</html>
