<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>404 Lost in Space | Mathiya Angirasa</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="./assets/css/global.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./assets/js/tailwind-config.js"></script>

    <style>
        .glitch-text {
            position: relative;
            color: white;
            z-index: 10;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
        }

        .glitch-text::before {
            left: -3px;
            text-shadow: -2px 0 var(--color-primary);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: 3px;
            text-shadow: 2px 0 var(--color-accent);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(20% 0 80% 0);
            }

            20% {
                clip-path: inset(60% 0 10% 0);
            }

            40% {
                clip-path: inset(40% 0 50% 0);
            }

            60% {
                clip-path: inset(80% 0 5% 0);
            }

            80% {
                clip-path: inset(10% 0 70% 0);
            }

            100% {
                clip-path: inset(30% 0 40% 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(10% 0 60% 0);
            }

            20% {
                clip-path: inset(30% 0 20% 0);
            }

            40% {
                clip-path: inset(70% 0 10% 0);
            }

            60% {
                clip-path: inset(20% 0 50% 0);
            }

            80% {
                clip-path: inset(50% 0 30% 0);
            }

            100% {
                clip-path: inset(5% 0 80% 0);
            }
        }
    </style>
</head>

<body
    class="bg-background-dark font-sans text-slate-100 flex items-center justify-center min-h-screen overflow-hidden relative">

    <div id="particles-canvas" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-1/4 left-1/4 w-[50%] h-[50%] bg-orb-cyan blur-3xl opacity-40 animate-pulse-glow"></div>
        <div class="absolute bottom-1/4 right-1/4 w-[50%] h-[50%] bg-orb-violet blur-3xl opacity-40 animate-pulse-glow"
            style="animation-delay: 1.5s"></div>
    </div>

    <main class="relative z-10 text-center px-6 max-w-2xl animate-fade-up">
        <!-- SVG Astronaut -->
        <div class="mb-8 flex justify-center animate-float">
            <svg class="w-32 h-32 md:w-48 md:h-48 text-primary drop-shadow-[0_0_15px_rgba(0,212,255,0.4)]" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.5"
                    d="M11.933 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z" />
            </svg>
        </div>

        <h1 class="text-9xl md:text-[12rem] font-display font-black tracking-tighter glitch-text mb-4" data-text="404">
            404</h1>

        <h2 class="text-3xl md:text-5xl font-display font-bold glow-text mb-4">Lost in the Void</h2>
        <p class="text-slate-400 text-lg md:text-xl mb-12">This page has drifted into the cosmos and cannot be found.
        </p>

        <a href="index.html"
            class="inline-flex items-center justify-center gap-3 px-10 py-5 bg-gradient-to-r from-primary to-accent-violet text-background-dark font-bold rounded-xl text-xl hover:scale-105 transition-transform shadow-[0_0_40px_rgba(0,212,255,0.4)] group">
            <span
                class="material-symbols-outlined group-hover:-translate-y-1 group-hover:translate-x-1 transition-transform">rocket_launch</span>
            Return to Base
        </a>
    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/engine@3.0.3/dist/tsparticles.engine.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/basic@3.0.3/dist/tsparticles.basic.min.js"></script>
    <script src="./assets/js/core.js"></script>
</body>

</html>
