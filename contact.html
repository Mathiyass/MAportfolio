<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22D3EE">
  <title>Contact | MATHIYA</title>
  
  <meta name="description" content="Get in touch with Mathisha Angirasa for freelance work, consulting, or collaboration.">
  
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400,500,700&f[]=syne@600,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">MATHIYA</a>
    <div class="nav-links hidden-mobile">
      <a href="index.html" class="nav-link">Home</a>
      <a href="projects.html" class="nav-link">Projects</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="omniscience.html" class="nav-link">Omniscience</a>
    </div>
    <div class="flex items-center gap-4">
      <a href="contact.html" class="btn btn--primary nav-cta">Get in touch</a>
    </div>
  </nav>

  <main id="main" class="content-hidden">
    <section class="section" style="padding-top: 160px; min-height: 100vh;">
      <div class="container grid-12">
        <div style="grid-column: span 5;" data-reveal>
          <h1 style="font-family: var(--font-display); font-size: 72px; line-height: 0.9; margin-bottom: 32px;">Let's build<br>something<br><span class="gradient-text">epic.</span></h1>
          
          <div class="flex-col gap-6" style="margin-top: 48px;">
            <div class="flex items-center gap-4">
              <div style="width: 48px; height: 48px; border-radius: var(--r-full); background: var(--bg-subtle); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-1);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
              </div>
              <div>
                <div style="font-family: var(--font-head); font-size: 14px; color: var(--text-2);">Email</div>
                <div style="font-family: var(--font-body); font-size: 18px; color: var(--text-0);">mathiya.dev@gmail.com</div>
              </div>
            </div>

            <div class="flex items-center gap-4">
              <div style="width: 48px; height: 48px; border-radius: var(--r-full); background: var(--bg-subtle); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-1);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
              </div>
              <div>
                <div style="font-family: var(--font-head); font-size: 14px; color: var(--text-2);">Phone</div>
                <div style="font-family: var(--font-body); font-size: 18px; color: var(--text-0);">+94 77 000 0000</div>
              </div>
            </div>
          </div>
          
          <div class="card" style="margin-top: 48px; padding: 24px; border-left: 3px solid var(--cyan);">
            <div class="flex items-center justify-between mb-2">
              <span style="font-family: var(--font-head); font-size: 18px; color: var(--text-0);">Current Status</span>
              <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); animation: neonPulseCyan 2s infinite;"></div>
            </div>
            <p style="font-family: var(--font-body); font-size: 15px; color: var(--text-2);">
              Accepting freelance projects and full-time opportunities. My timezone is GMT+5:30 (Colombo).
            </p>
          </div>
        </div>

        <div style="grid-column: 7 / span 6;" data-reveal style="--i:1">
          <form id="contact-form" action="https://formsubmit.co/mathiya.dev@gmail.com" method="POST" class="card" style="display: flex; flex-direction: column; gap: 24px;">
            <input type="hidden" name="_next" value="https://mathiyass.github.io/MAportfolio/contact.html">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New Contact Request from Portfolio">
            
            <div class="flex-col gap-2">
              <label for="name" style="font-family: var(--font-head); font-size: 14px; color: var(--text-0);">Name</label>
              <input type="text" name="name" id="name" class="input" placeholder="John Doe" required>
            </div>
            
            <div class="flex-col gap-2">
              <label for="email" style="font-family: var(--font-head); font-size: 14px; color: var(--text-0);">Email</label>
              <input type="email" name="email" id="email" class="input" placeholder="john@example.com" required>
            </div>
            
            <div class="flex-col gap-2">
              <label for="message" style="font-family: var(--font-head); font-size: 14px; color: var(--text-0);">Message</label>
              <textarea name="message" id="message" class="input" rows="5" placeholder="How can I help you?" required style="resize: vertical; min-height: 120px;"></textarea>
            </div>
            
            <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: 16px;">Send Message</button>
          </form>
        </div>
      </div>
    </section>

    <footer class="container" style="padding-block: 80px; border-top: 1px solid var(--border-0);">
      <div class="flex justify-between items-center">
        <div>
          <div class="nav-logo">MATHIYA</div>
          <p style="font-family: var(--font-mono); font-size: 12px; color: var(--text-3); margin-top: 12px;">© 2025 MATHIYA — Mathisha Angirasa</p>
        </div>
      </div>
    </footer>
  </main>

  <script type="module">
    import { Loader } from './assets/js/core/Loader.js';
    import { Cursor } from './assets/js/core/Cursor.js';
    import { SmoothScroll } from './assets/js/core/SmoothScroll.js';
    import { ScrollReveal } from './assets/js/core/ScrollReveal.js';
    import { Byte } from './assets/js/mascot/Byte.js';
    import { PageTransitions } from './assets/js/core/PageTransitions.js';

    new Loader();
    new Cursor();
    new SmoothScroll();
    new ScrollReveal();
    new PageTransitions();

    window.addEventListener('loader:complete', () => {
      new Byte();

      // Draft saving
      const form = document.getElementById('contact-form');
      const name = document.getElementById('name');
      const email = document.getElementById('email');
      const msg = document.getElementById('message');

      name.value = localStorage.getItem('draft_name') || '';
      email.value = localStorage.getItem('draft_email') || '';
      msg.value = localStorage.getItem('draft_msg') || '';

      [name, email, msg].forEach(input => {
        input.addEventListener('input', (e) => {
          localStorage.setItem(\`draft_\${e.target.id}\`, e.target.value);
        });
      });

      form.addEventListener('submit', () => {
        localStorage.removeItem('draft_name');
        localStorage.removeItem('draft_email');
        localStorage.removeItem('draft_msg');
        // Let formsubmit.co handle the rest
      });
    });
  </script>
</body>
</html>
