    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'orbitron': ['Orbitron', 'monospace'],
                        'inter': ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'cyber-cyan': '#00FFDE',
                        'cyber-red': '#FF3366',
                        'neon-pink': '#FF10F0',
                        'electric-blue': '#0080FF',
                        'dark-bg': '#0a0a0a',
                        'dark-card': '#1a1a2e',
                        'dark-accent': '#16213e',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow-pulse': 'glowPulse 2s ease-in-out infinite alternate',
                        'text-shimmer': 'textShimmer 3s ease-in-out infinite',
                    },
                    keyframes: {
                        'float': {
                            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        },
                        'glowPulse': {
                            '0%': { boxShadow: '0 0 20px rgba(0, 255, 222, 0.5)' },
                            '100%': { boxShadow: '0 0 40px rgba(0, 255, 222, 1), 0 0 60px rgba(255, 51, 102, 0.5)' },
                        },
                        'textShimmer': {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                    },
                }
            }
        }

                                    <label class="block text-sm font-medium mb-2 text-cyber-cyan" for="firstName">First

                                    <input type="text" id="firstName" name="firstName"

                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2 text-cyber-cyan" for="lastName">Last

                                    <input type="text" id="lastName" name="lastName"
                                        class="form-input w-full px-4 py-3 rounded-lg" placeholder="Doe" required>
                                </div>
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-medium mb-2 text-cyber-cyan" for="email">Email
                                    Address</label>
                                <input type="email" id="email" name="email"
                                    class="form-input w-full px-4 py-3 rounded-lg" placeholder="john@example.com"
                                    required>
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-medium mb-2 text-cyber-cyan"
                                    for="subject">Subject</label>
                                <input type="text" id="subject" name="subject"
                                    class="form-input w-full px-4 py-3 rounded-lg" placeholder="Project Collaboration"
                                    required>
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-medium mb-2 text-cyber-cyan"
                                    for="message">Message</label>
                                <textarea id="message" name="message" class="form-input w-full px-4 py-3 rounded-lg"
                                    rows="4" placeholder="Tell me about your project or just say hello..."
                                    required></textarea>
                            </div>
                            <button type="submit"
                                class="neon-btn text-black font-semibold py-3 px-8 rounded-lg transition-all duration-300 font-orbitron w-full">
                                <i class="fas fa-paper-plane mr-2"></i>Send Message
                            </button>
                        </form>
                    </div>

                    <div class="space-y-8" data-aos="fade-left">
                        <div class="glass p-8 rounded-2xl">
                            <h2 class="text-3xl font-bold gradient-text mb-6">Get In Touch</h2>
                            <div class="space-y-4">
