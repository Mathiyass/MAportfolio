<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22D3EE">
  <title>Admin | MATHIYA</title>
  
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400,500,700&f[]=syne@600,700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body style="display: flex; height: 100vh; overflow: hidden; background: var(--bg-base);">

  <div id="auth-gate" style="position: fixed; inset: 0; z-index: 1000; background: var(--bg-base); display: flex; align-items: center; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
      <h2 style="font-family: var(--font-head); font-size: 24px; margin-bottom: 24px;">Restricted Access</h2>
      <input type="password" id="admin-pwd" class="input" placeholder="Password" style="margin-bottom: 16px;">
      <button id="btn-login" class="btn btn--primary" style="width: 100%;">Unlock</button>
      <p id="auth-error" style="color: var(--red); font-size: 14px; margin-top: 16px; display: none;">Invalid credentials.</p>
    </div>
  </div>

  <aside style="width: 260px; background: var(--bg-muted); border-right: 1px solid var(--border-1); display: flex; flex-direction: column; padding: 24px;">
    <div class="nav-logo" style="margin-bottom: 48px;">MATHIYA<span style="color: var(--cyan);">.admin</span></div>
    
    <nav style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
      <button class="btn btn--secondary" style="justify-content: flex-start; border-color: transparent; padding-inline: 16px; background: var(--cyan-ghost); color: var(--cyan);">Dashboard</button>
      <button class="btn btn--secondary" style="justify-content: flex-start; border-color: transparent; padding-inline: 16px;">Blog Editor</button>
      <button class="btn btn--secondary" style="justify-content: flex-start; border-color: transparent; padding-inline: 16px;">Settings</button>
    </nav>

    <a href="index.html" class="btn btn--secondary" style="width: 100%; margin-top: 24px;">Return to Site</a>
  </aside>

  <main style="flex: 1; padding: 48px; overflow-y: auto;">
    <h1 style="font-family: var(--font-head); font-size: 32px; margin-bottom: 32px;">Dashboard Overview</h1>
    
    <div class="grid-3" style="margin-bottom: 48px;">
      <div class="card" style="padding: 24px;">
        <span style="font-family: var(--font-head); color: var(--text-2);">Total Visitors</span>
        <div style="font-family: var(--font-stat); font-size: 48px; color: var(--text-0); margin-top: 8px;">1,204</div>
      </div>
      <div class="card" style="padding: 24px;">
        <span style="font-family: var(--font-head); color: var(--text-2);">Active Sessions</span>
        <div style="font-family: var(--font-stat); font-size: 48px; color: var(--cyan); margin-top: 8px;">3</div>
      </div>
      <div class="card" style="padding: 24px;">
        <span style="font-family: var(--font-head); color: var(--text-2);">System Status</span>
        <div style="font-family: var(--font-stat); font-size: 48px; color: var(--text-0); margin-top: 8px;">NOMINAL</div>
      </div>
    </div>

    <div class="card">
      <h2 style="font-family: var(--font-head); font-size: 24px; margin-bottom: 24px;">GitHub Activity</h2>
      <div id="admin-gh-chart" style="width: 100%; height: 150px;"></div>
    </div>
  </main>

  <script type="module">
    import { GitHubStats } from './assets/js/core/GitHubStats.js';
    import { GitHubChart } from './assets/js/utils/github-chart.js';

    // Simple SHA-256 hash for demo purposes. Not secure for real production without backend.
    const EXPECTED_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"; // hash of "admin"

    async function hash(string) {
      const utf8 = new TextEncoder().encode(string);
      const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(bytes => bytes.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('btn-login').addEventListener('click', async () => {
      const pwd = document.getElementById('admin-pwd').value;
      const h = await hash(pwd);
      if (h === EXPECTED_HASH || pwd === 'admin') { // allowing plaintext 'admin' for demo review
        document.getElementById('auth-gate').style.display = 'none';
        
        // Load charts
        const chart = new GitHubChart(document.getElementById('admin-gh-chart'), 'Mathiyass');
        chart.render();
      } else {
        document.getElementById('auth-error').style.display = 'block';
      }
    });

    document.getElementById('admin-pwd').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });
  </script>
</body>
</html>
