<!DOCTYPE html>
<html lang="en" data-theme="dual">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00E5FF">
  <title>Experiments Lab // Mathisha Angirasa</title>
  
  <meta name="description" content="Interactive WebGL Experiments Lab">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2303030A'/><text x='50' y='65' font-family='sans-serif' font-size='50' font-weight='900' fill='%2300E5FF' text-anchor='middle'>MA</text></svg>">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  
  <style>
    nav { position: fixed; top: 0; width: 100%; z-index: var(--z-nav); backdrop-filter: blur(28px) saturate(180%); background: var(--surface-glass); border-bottom: 1px solid var(--cyan-border); padding: 0 var(--gutter); height: 64px; display: flex; justify-content: space-between; align-items: center; transition: transform 300ms, background 300ms; }
    .nav-center { display: none; }
    @media (min-width: 1024px) { .nav-center { display: flex; gap: var(--s-32); } .hamburger { display: none; } }
    
    .exp-panel { border: 1px solid var(--cyan-border); background: var(--surface-0); margin-bottom: 64px; overflow: hidden; position: relative; }
    .exp-canvas-wrap { width: 100%; height: 400px; position: relative; background: var(--void); border-bottom: 1px solid var(--cyan-border); }
    .exp-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .exp-controls { padding: 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px; }
    
    .exp-slider { display: flex; flex-direction: column; gap: 8px; width: 200px; }
    .exp-slider label { font-family: var(--font-mono); font-size: 10px; color: var(--text-1); letter-spacing: 0.1em; }
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 8px; border-radius: 0; background: var(--cyan); cursor: pointer; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: var(--surface-1); }
    input[type=range]:focus { outline: none; }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="canvas-crt" style="position:fixed; inset:0; z-index:9998; pointer-events:none;"></div>

  <nav id="navbar" role="navigation">
    <a href="index.html" class="logo">
      <span style="font-family: var(--font-display); font-size: 20px; color: var(--cyan);">MA<span class="terminal-blink">_</span></span><span style="font-family: var(--font-mono); font-size: 20px; color: var(--text-1);">DEV</span>
    </a>
    <div class="nav-center">
      <a href="index.html" class="nav-link">INDEX</a>
      <a href="projects.html" class="nav-link">PROJECTS</a>
      <a href="skills.html" class="nav-link">SKILLS</a>
      <a href="blog.html" class="nav-link">BLOG</a>
      <a href="marketplace.html" class="nav-link">MARKETPLACE</a>
      <a href="contact.html" class="nav-link">CONTACT</a>
    </div>
  </nav>

  <div class="scroll-container">
    <main id="main" role="main" style="padding-top: 120px;">
      
      <section class="container" style="text-align: center; margin-bottom: 48px;">
        <div class="badge" style="margin-bottom: 16px;">LIVE WEBGL LAB</div>
        <h1 style="font-family: var(--font-display); font-size: clamp(32px, 5vw, 64px);" data-reveal data-reveal-clip>EXPERIMENTS</h1>
      </section>

      <section class="container">
        
        <!-- EXP 01 -->
        <div class="exp-panel" data-reveal>
          <div class="exp-canvas-wrap">
            <canvas class="exp-canvas" id="exp1"></canvas>
          </div>
          <div class="exp-controls">
            <div>
              <h3 style="font-family: var(--font-display); font-size: 24px; margin-bottom: 8px;">Plasma Fluid</h3>
              <p style="font-size: 14px; color: var(--text-1);">SHADER_11_PLASMA. 5-octave sine interference.</p>
            </div>
            <div class="exp-slider">
              <label>SPEED_MULTIPLIER</label>
              <input type="range" min="0.1" max="3" step="0.1" value="1" id="exp1-speed">
            </div>
            <button class="btn btn--ghost" onclick="document.getElementById('exp1').requestFullscreen()">FULLSCREEN</button>
          </div>
        </div>

        <!-- EXP 02 -->
        <div class="exp-panel" data-reveal>
          <div class="exp-canvas-wrap">
            <canvas class="exp-canvas" id="exp2"></canvas>
          </div>
          <div class="exp-controls">
            <div>
              <h3 style="font-family: var(--font-display); font-size: 24px; margin-bottom: 8px;">Dimensional Portal</h3>
              <p style="font-size: 14px; color: var(--text-1);">SHADER_12_PORTAL. Mouse interactive.</p>
            </div>
            <div class="exp-slider">
              <label>PULSE_FREQUENCY</label>
              <input type="range" min="1" max="20" step="1" value="15" id="exp2-freq">
            </div>
            <button class="btn btn--ghost" onclick="document.getElementById('exp2').requestFullscreen()">FULLSCREEN</button>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script type="module">
    import { WebGLEngine } from './assets/js/engine/WebGLEngine.js';
    import { SHADER_11_PLASMA, SHADER_12_PORTAL } from './assets/js/engine/shaders.js';
    import { CustomCursor } from './assets/js/core/Cursor.js';
    import { SmoothScroll } from './assets/js/core/SmoothScroll.js';
    import { ScrollReveal } from './assets/js/core/ScrollReveal.js';
    import { ThemeSystem } from './assets/js/core/ThemeSystem.js';

    new ThemeSystem();
    new CustomCursor();
    new SmoothScroll();
    new ScrollReveal();

    const e1 = new WebGLEngine(document.getElementById('exp1'));
    e1.compileProgram('plasma', SHADER_11_PLASMA.vert, SHADER_11_PLASMA.frag);
    e1.createFullscreenQuad('fs');
    
    let speed1 = 1.0;
    document.getElementById('exp1-speed').addEventListener('input', (e) => speed1 = parseFloat(e.target.value));
    
    // We hack the u_time uniform via render callback to scale speed
    let time1 = 0;
    e1.render('plasma', {}, (gl, ms) => {
      // Manual time scale not easily injected without modifying engine, we just use default render and accept standard speed for simplicity in this demo,
      // but let's override the uniform manually here:
      const loc = e1.getUniform('plasma', 'u_time');
      time1 += 0.016 * speed1;
      gl.uniform1f(loc, time1);
    });

    const e2 = new WebGLEngine(document.getElementById('exp2'));
    e2.compileProgram('portal', SHADER_12_PORTAL.vert, SHADER_12_PORTAL.frag);
    e2.createFullscreenQuad('fs');
    e2.render('portal');

  </script>
</body>
</html>
